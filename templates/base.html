<!-- в данном файле находится базовый шаблон для html-представлений -->
{% load static %}
<!DOCTYPE html>
<html lang="ru" 
      data-user-authenticated="{{ request.user.is_authenticated|yesno:'true,false' }}"
      data-user-theme="{% if request.user.is_authenticated %}{% if request.user.is_light_theme %}light{% else %}dark{% endif %}{% endif %}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{% block title %}UNIREAX{% endblock %}</title>

    {% load static %}

    <script>
        (function() {
            const html = document.documentElement;
            const isAuth = html.getAttribute('data-user-authenticated') === 'true';
            const dbTheme = html.getAttribute('data-user-theme');
            
            let visionMode = false;
            let highContrast = false;
            
            try {
                visionMode = localStorage.getItem('visionMode') === 'true';
                highContrast = localStorage.getItem('highContrast') === 'true';
            } catch(e) {}
            
            if (visionMode) {
                html.setAttribute('data-theme', 'vision');
                document.body.classList.add('vision-mode');
            } 

            else if (highContrast) {
                document.body.classList.add('high-contrast');
                let theme;
                if (isAuth && dbTheme) {
                    theme = dbTheme;
                    try { localStorage.setItem('theme', theme); } catch(e) {}
                } else {
                    try { theme = localStorage.getItem('theme') || 'dark'; } catch(e) { theme = 'dark'; }
                }
                html.setAttribute('data-theme', theme);
            }
            else {
                let theme;
                if (isAuth && dbTheme) {
                    theme = dbTheme;
                    try { localStorage.setItem('theme', theme); } catch(e) {}
                } else {
                    try { theme = localStorage.getItem('theme') || 'dark'; } catch(e) { theme = 'dark'; }
                }
                html.setAttribute('data-theme', theme);
            }
            try {
                const fontSize = localStorage.getItem('accessibilityFontSize');
                if (fontSize && fontSize !== '100') {
                    const multiplier = parseInt(fontSize) / 100;
                    html.style.fontSize = (16 * multiplier) + 'px';
                }
            } catch(e) {}
        })();
    </script>

    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Arial+Black&display=swap" rel="stylesheet">

    <link rel="icon" href="{% static 'images/unireax_logo.PNG' %}" type="image/png">
</head>
<body>

    {% include '_inc/_header.html' %}

    <main class="main-content" id="main-content">
        {% if messages %}
        <div class="container mt-3">
            {% for message in messages %}
            <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
            {% endfor %}
        </div>
        {% endif %}
        
        {% block content %}{% endblock %}
    </main>

    {% include '_inc/_footer.html' %}

    <div class="accessibility-panel" id="accessibility-panel">
        <button class="accessibility-btn" id="visionModeBtn" title="Версия для слабовидящих">
            <i class="fas fa-eye"></i>
        </button>
        <button class="accessibility-btn" id="highContrastBtn" title="Высокий контраст">
            <i class="fas fa-adjust"></i>
        </button>
        <button class="accessibility-btn" id="disableImagesBtn" title="Отключить изображения">
            <i class="fas fa-image"></i>
        </button>
        <button class="accessibility-btn" id="grayscaleBtn" title="Чёрно-белые изображения">
            <i class="fas fa-palette"></i>
        </button>
        <button class="accessibility-btn" id="resetAccessibilityBtn" title="Сбросить настройки">
            <i class="fas fa-undo"></i>
        </button>
    </div>

    <canvas id="stars-canvas"></canvas>

    <script src="{% static 'js/theme-toggle.js' %}"></script>
    <script src="{% static 'js/dropdown.js' %}"></script>
    <script src="{% static 'js/search.js' %}"></script>
    <script src="{% static 'js/view-toggle.js' %}"></script>
    <script src="{% static 'js/stars-simple.js' %}"></script>
    <script src="{% static 'js/burger-menu.js' %}"></script> 
    <script src="{% static 'js/api-error-handler.js' %}"></script>
    <script src="{% static 'js/accessibility.js' %}"></script>
    
    {% block scripts %}{% endblock %}
</body>
</html>
