{% extends 'base.html' %}
{% load static %}

{% block title %}{{ error_title }} - UNIREAX{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-wrapper">
        <div class="auth-card" style="text-align: center;">
            <div class="auth-header">
                <div class="auth-logo" style="font-size: 80px; color: var(--primary);">
                    <i class="{{ error_icon|default:'fas fa-exclamation-circle' }}"></i>
                </div>
                <h1 class="auth-title" style="font-size: 72px; margin: 20px 0;">{{ error_code }}</h1>
                <h2 class="auth-subtitle" style="font-size: 28px; margin-bottom: 20px;">{{ error_title }}</h2>
            </div>
            
            <p style="color: var(--text-soft); margin: 20px 0; font-size: 16px; line-height: 1.6;">
                {{ error_message }}
            </p>
            
            <div style="display: flex; gap: 15px; justify-content: center; margin-top: 30px;">
                <a href="{% url 'main_page' %}" class="auth-btn" style="background: var(--primary);">
                    <i class="fas fa-home"></i> Главная
                </a>
                <button onclick="history.back()" class="auth-btn" style="background: #6c757d;">
                    <i class="fas fa-arrow-left"></i> Назад
                </button>
            </div>
        </div>
    </div>
</div>
{% endblock %}
